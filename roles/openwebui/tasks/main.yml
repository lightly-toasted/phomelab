---
- name: Set Open WebUI state fact
  ansible.builtin.set_fact:
    openwebui_state: "{{ 'present' if openwebui_enabled else 'absent' }}"

- name: Ensure venv directory exists
  ansible.builtin.file:
    path: /opt/openwebui/venv
    state: directory
    mode: '0755'

- name: Install Open WebUI
  ansible.builtin.pip:
    name: open-webui
    virtualenv: /opt/openwebui/venv
    state: "{{ openwebui_state }}"

- name: Create s6 service
  include_role:
    name: s6_service
  vars:
    s6_service_name: openwebui
    s6_service_command: "exec /opt/openwebui/venv/bin/open-webui serve --host {{ openwebui_host }} --port {{ openwebui_port }}"
    s6_service_env: "{{ openwebui_env }}"
    s6_service_state: "{{ openwebui_state }}"
