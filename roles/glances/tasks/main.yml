---
- name: Set glances state fact
  ansible.builtin.set_fact:
    glances_state: "{{ 'present' if glances_enabled else 'absent' }}"

- name: Build glances
  include_role:
    name: nix_build
  vars:
    nix_build_attr: nixpkgs#glances
    nix_build_out: /opt/glances
    nix_build_state: "{{ glances_state }}"

- name: Create s6 service
  include_role:
    name: s6_service
  vars:
    s6_service_name: glances
    s6_service_command: "exec /opt/glances/bin/glances -w"
    s6_service_create_user: false
    s6_service_state: "{{ glances_state }}"

